                        <input type="file" id="input-image" accept="image/*" class="hidden" onchange="handleImage(this)">

                </div>
                
                <div class="flex gap-3 mt-auto">
                    <button onclick="toStep(2)" class="flex-1 bg-gray-100 text-gray-500 font-bold py-5 rounded-2xl transition-all">Batal</button>
                    <button id="btn-finish" disabled onclick="submitPayment()" class="flex-[2] bg-green-500 text-white font-bold py-5 rounded-2xl opacity-50 cursor-not-allowed transition-all">Kirim Konfirmasi</button>

        <div id="loading" class="hidden absolute inset-0 bg-white/90 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
            <div class="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>

            <div class="w-full space-y-4">

                        <!-- =========================================================
                             UBAH NOMOR DAN NAMA ADMIN DI BAWAH INI 
                             (GUNAKAN KODE NEGARA 62 TANPA + ATAU 0 DI DEPANNYA)
                             ========================================================= -->
                        <option value="6289666600202">Admin Kantor</option>
                        <option value="6289501233337">Admin Teknisi</option>
                        <option value="62895321010615">Admin Pembayaran</option>
                        <!-- ========================================================= -->
                    </select>
                </div>

                <!-- TOMBOL KIRIM WA -->
                <button onclick="kirimWA()" class="w-full bg-[#25D366] hover:bg-[#1DA851] text-white font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.305-.885-.653-1.482-1.459-1.656-1.756-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                    Kabari Admin
                </button>
                <button onclick="location.reload()" class="w-full bg-white hover:bg-gray-100 text-gray-500 font-bold py-4 rounded-2xl transition-all border border-gray-200">Selesai & Kembali</button>
            </div>
        </div>
    </div>

    <!-- UI & LORIKA QRIS Scripts -->
    <script>
        // Global variabel untuk menyimpan pesan WA yang sudah digenerate
        window.pesanWA = "";

        // Rumus Keamanan Standar Bank Indonesia (CRC16)
        function crc16(s) {
            let crc = 0xFFFF;
            for (let c = 0; c < s.length; c++) {
                crc ^= s.charCodeAt(c) << 8;
                for (let i = 0; i < 8; i++) {
                    if (crc & 0x8000) crc = (crc << 1) ^ 0x1021;
                    else crc = crc << 1;
                }
            }
            return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
        }

        // Fungsi Rakit Ulang QRIS menyuntikkan nominal tagihan
        function makeDynamicQris(qris, nominal) {
            if (!qris) return "";
            
            // Hapus kode CRC bawaan di ujung
            let step1 = qris.substring(0, qris.length - 8); 
            
            // Ubah mode dari QRIS Statis (11) jadi Dinamis (12)
            step1 = step1.replace("010211", "010212"); 
            
            // Format nominal
            let nomStr = nominal.toString();
            let tag54 = "54" + nomStr.length.toString().padStart(2, '0') + nomStr;
            
            let res = "";
            // Suntik nominal ke kerangka QRIS
            if (step1.includes("5802ID")) {
                res = step1.split("5802ID").join(tag54 + "5802ID") + "6304";
            } else {
                res = step1 + tag54 + "6304";
            }
            
            return res + crc16(res);
        }

        window.toStep = (n) => {
            if (n === 2) {
                if (!document.getElementById('wifi-name').value || !document.getElementById('sender-name').value) return alert("Silakan lengkapi data terlebih dahulu!");
            }
            
            // LOGIKA PEMBUATAN QRIS SAAT MASUK KE LANGKAH 3
            if (n === 3) {
                const container = document.getElementById('dynamic-qris-container');
                container.innerHTML = ""; // Bersihkan QR sebelumnya
                
                if(window.globalSettings && window.globalSettings.qrisString && window.selectedPackage) {
                    const nominalTagihan = window.selectedPackage.price;
                    const stringQrisBaru = makeDynamicQris(window.globalSettings.qrisString, nominalTagihan);
                    
                    new QRCode(container, {
                        text: stringQrisBaru,
                        width: 200,
                        height: 200,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.M
                    });
                } else {
                    container.innerHTML = "<p class='text-xs text-red-500 font-bold p-4 text-center'>Admin belum mengatur Master QRIS.</p>";
                }
            }
            
            const steps = [1, 2, 3];
            steps.forEach(s => {
                if (s === n) {
                    document.getElementById(`step-${s}`).classList.remove('hidden');
                } else {
                    document.getElementById(`step-${s}`).classList.add('hidden');
                }
            });
        };

        window.handleImage = (input) => {
            if (!input.files[0]) return;
            // Validasi ukuran < 2MB
            if(input.files[0].size > 2 * 1024 * 1024) { alert("Ukuran gambar maksimal 2MB."); return; }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                window.proofBase64 = e.target.result;
                document.getElementById('upload-icon-container').className = "w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-3 ring-4 ring-green-50 transition-all";
                document.getElementById('upload-icon').setAttribute('data-lucide', 'check');
                document.getElementById('upload-icon').classList.replace('text-blue-600', 'text-green-600');
                if (window.lucide) window.lucide.createIcons();
                
                document.getElementById('upload-text').innerText = "Bukti Tersimpan";
                document.getElementById('upload-text').className = "text-sm font-black text-green-700";
                document.getElementById('btn-finish').disabled = false;
                document.getElementById('btn-finish').className = "flex-[2] bg-green-600 hover:bg-green-700 text-white font-bold py-5 rounded-2xl shadow-lg transition-all cursor-pointer";
            };
            reader.readAsDataURL(input.files[0]);
        };

        window.kirimWA = () => {
            // Ambil nomor yang dipilih dari dropdown
            const noAdmin = document.getElementById('wa-admin-number').value;
            // Buka tab WhatsApp
            window.open(`https://wa.me/${noAdmin}?text=${window.pesanWA}`, '_blank');
        };
    </script>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { getFirestore, doc, collection, addDoc, serverTimestamp, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        // =================================================================
        // MASUKKAN FIREBASE CONFIG ANDA DI SINI (JANGAN LUPA!)
        // =================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAG0Hvd_63itgiOXP4GBjgQG4MhkbWXedc",
  authDomain: "wifi-pay.firebaseapp.com",
  projectId: "wifi-pay",
  storageBucket: "wifi-pay.firebasestorage.app",
  messagingSenderId: "678974524617",
  appId: "1:678974524617:web:908268390ed189362ad118"
        };
        // =================================================================

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        window.globalSettings = null;
        window.selectedPackage = null;
        window.selectedRegion = null;
        window.proofBase64 = null;

        signInAnonymously(auth).catch(err => console.error(err));

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) listenToRemoteSettings();
        });
        
        if(window.lucide) lucide.createIcons();

        function listenToRemoteSettings() {
            if (!user) return;
            const docRef = doc(db, 'config', 'settings'); 
            
            onSnapshot(docRef, (snap) => {
                const select = document.getElementById('select-region');
                if (snap.exists() && snap.data().regions) {
                    window.globalSettings = snap.data();
                    select.innerHTML = '<option value="">-- Silakan Pilih Wilayah Anda --</option>';
                    window.globalSettings.regions.forEach((reg, idx) => {
                        const opt = document.createElement('option');
                        opt.value = idx; opt.innerText = reg.name;
                        select.appendChild(opt);
                    });
                } else {
                    select.innerHTML = '<option value="">-- Admin belum mengatur wilayah --</option>';
                }
            });
        }

        window.loadPackagesForRegion = (idx) => {
            const btnNext = document.getElementById('btn-next-step-2');
            const container = document.getElementById('package-list');

            if (idx === "") {
                container.innerHTML = ``; btnNext.disabled = true; btnNext.classList.add('opacity-50'); return;
            }
            
            window.selectedRegion = window.globalSettings.regions[idx];
            container.innerHTML = '';
            
            window.selectedRegion.packages.forEach((pkg) => {
                const isActive = window.selectedPackage && window.selectedPackage.mbps === pkg.mbps;
                const card = document.createElement('div');
                card.onclick = () => {
                    window.selectedPackage = pkg;
                    loadPackagesForRegion(idx);
                    btnNext.disabled = false; btnNext.classList.remove('opacity-50', 'cursor-not-allowed');
                };
                card.className = `p-4 rounded-2xl border-2 cursor-pointer flex justify-between items-center transition-all ${isActive ? 'border-blue-600 bg-blue-50 shadow-md' : 'border-gray-100 bg-white hover:border-blue-200'}`;
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center ${isActive ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-400'}">
                            <i data-lucide="zap" class="w-5 h-5"></i>
                        </div>
                        <div><p class="font-black text-gray-800 text-lg">${pkg.mbps} Mbps</p></div>
                    </div>
                    <div class="text-right"><p class="font-black text-blue-600 text-lg">Rp ${pkg.price.toLocaleString('id-ID')}</p></div>
                `;
                container.appendChild(card);
            });
            if(window.lucide) lucide.createIcons();
            
            if(window.selectedPackage) {
                document.getElementById('display-total').innerText = "Rp " + window.selectedPackage.price.toLocaleString('id-ID');
            }
        };

        window.submitPayment = async () => {
            if (!user || !window.proofBase64) return;
            
            const wifiName = document.getElementById('wifi-name').value;
            const custId = document.getElementById('cust-id').value || '-';
            const senderName = document.getElementById('sender-name').value;
            
            document.getElementById('loading').classList.remove('hidden');
            try {
                // 1. Kirim data dan foto ke Dashboard Admin (Firebase)
                const transRef = collection(db, 'transactions'); 
                await addDoc(transRef, {
                    wifiName: wifiName,
                    idPelanggan: custId,
                    senderName: senderName,
                    regionName: window.selectedRegion.name,
                    mbps: window.selectedPackage.mbps,
                    amount: window.selectedPackage.price,
                    proofImage: window.proofBase64,
                    timestamp: serverTimestamp()
                });
                
                // 2. Siapkan Teks WhatsApp untuk pelanggan (dikirim saat tombol dipencet)
                window.pesanWA = `Halo Admin, saya sudah mentransfer pembayaran WiFi.%0A%0A*Detail Pembayaran:*%0A- Nama WiFi: ${wifiName}%0A- Pengirim: ${senderName}%0A- Paket: ${window.selectedPackage.mbps} Mbps%0A- Nominal: Rp ${window.selectedPackage.price.toLocaleString('id-ID')}%0A%0ABukti transfer sudah saya upload di aplikasi. Tolong dicek ya. Terima kasih!`;

                // 3. Tampilkan layar sukses dengan 3 pilihan Admin
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('view-success').classList.remove('hidden');
            } catch (err) { 
                document.getElementById('loading').classList.add('hidden');
                alert("Gagal mengirim data. Pastikan koneksi internet stabil."); 
            }
        };
    </script>
